<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocGen Legal Pro | Gestión Documental</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .drag-over { @apply bg-blue-100 border-blue-500; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900">

    <nav class="bg-white border-b border-slate-200 py-4 px-8 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-2">
            <div class="bg-blue-600 p-2 rounded-lg"><i class="fas fa-gavel text-white text-xl"></i></div>
            <h1 class="text-xl font-bold tracking-tight text-slate-800">DocGen <span class="text-blue-600">Legal Pro</span></h1>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto py-12 px-6">
        <div class="text-center mb-12">
            <h2 class="text-3xl font-extrabold text-slate-900 mb-2">Generación Masiva de Documentos</h2>
            <p class="text-slate-500">Automatiza tus contratos legales en segundos.</p>
        </div>

        <div class="bg-white rounded-2xl shadow-xl border border-slate-100 overflow-hidden">
            <div class="p-8">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">

                    <div class="space-y-4">
                        <label class="block text-sm font-semibold text-slate-700">1. Base de Datos (Excel)</label>
                        <div id="drop-zone-excel" class="relative group">
                            <input type="file" id="excelFile" accept=".xlsx, .xls" class="hidden">
                            <label for="excelFile" class="flex flex-col items-center justify-center w-full h-44 border-2 border-dashed border-slate-300 rounded-xl cursor-pointer bg-slate-50 hover:bg-blue-50 hover:border-blue-300 transition-all">
                                <i id="icon-excel" class="fas fa-file-excel text-4xl text-slate-400 mb-3"></i>
                                <span id="text-excel" class="text-sm text-slate-600 font-medium">Arrastra o selecciona Excel</span>
                                <span id="name-excel" class="text-xs text-blue-600 mt-2 font-bold hidden"></span>
                            </label>
                        </div>
                    </div>

                    <div class="space-y-4">
                        <label class="block text-sm font-semibold text-slate-700">2. Plantilla (Word)</label>
                        <div id="drop-zone-word" class="relative group">
                            <input type="file" id="wordFile" accept=".docx" class="hidden">
                            <label for="wordFile" class="flex flex-col items-center justify-center w-full h-44 border-2 border-dashed border-slate-300 rounded-xl cursor-pointer bg-slate-50 hover:bg-blue-50 hover:border-blue-300 transition-all">
                                <i id="icon-word" class="fas fa-file-word text-4xl text-slate-400 mb-3"></i>
                                <span id="text-word" class="text-sm text-slate-600 font-medium">Arrastra o selecciona Plantilla</span>
                                <span id="name-word" class="text-xs text-blue-600 mt-2 font-bold hidden"></span>
                            </label>
                        </div>
                    </div>

                </div>

                <div class="mt-10">
                    <button onclick="enviarDatos()" id="btnGenerar" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg transition-all flex items-center justify-center gap-3">
                        <i class="fas fa-cog" id="spinner"></i>
                        <span>Generar Paquete Legal (.zip)</span>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Función para actualizar la UI al seleccionar archivos
        function updateUI(inputId, zoneId, iconId, textId, nameId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            const text = document.getElementById(textId);
            const nameSpan = document.getElementById(nameId);

            input.addEventListener('change', () => {
                if (input.files.length > 0) {
                    const fileName = input.files[0].name;
                    icon.classList.remove('text-slate-400');
                    icon.classList.add('text-green-500'); // Cambia a verde al subir
                    text.innerText = "Archivo cargado con éxito";
                    nameSpan.innerText = fileName;
                    nameSpan.classList.remove('hidden');
                }
            });
        }

        // Inicializar listeners
        updateUI('excelFile', 'drop-zone-excel', 'icon-excel', 'text-excel', 'name-excel');
        updateUI('wordFile', 'drop-zone-word', 'icon-word', 'text-word', 'name-word');

        // Lógica de Drag & Drop
        ['excelFile', 'wordFile'].forEach(id => {
            const zone = document.querySelector(`label[for="${id}"]`);

            ['dragover', 'dragleave', 'drop'].forEach(evt => {
                zone.addEventListener(evt, e => {
                    e.preventDefault();
                    if (evt === 'dragover') zone.classList.add('bg-blue-100', 'border-blue-500');
                    else zone.classList.remove('bg-blue-100', 'border-blue-500');

                    if (evt === 'drop') {
                        document.getElementById(id).files = e.dataTransfer.files;
                        document.getElementById(id).dispatchEvent(new Event('change'));
                    }
                });
            });
        });

        async function enviarDatos() {
            const excel = document.getElementById('excelFile').files[0];
            const word = document.getElementById('wordFile').files[0];
            const btn = document.getElementById('btnGenerar');
            const spinner = document.getElementById('spinner');

            if (!excel || !word) {
                alert("Por favor, sube ambos archivos.");
                return;
            }

            btn.disabled = true;
            spinner.classList.add('fa-spin');
            btn.querySelector('span').innerText = "Generando documentos...";

            const formData = new FormData();
            formData.append("excel_file", excel);
            formData.append("template_file", word);

            try {
                const response = await fetch("/generar-documentos/", { method: "POST", body: formData });
                if (response.ok) {
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'Contratos_Generados.zip';
                    document.body.appendChild(a);
                    a.click();
                    alert("¡Proceso completado!");
                }
            } catch (e) {
                alert("Error de conexión.");
            } finally {
                btn.disabled = false;
                spinner.classList.remove('fa-spin');
                btn.querySelector('span').innerText = "Generar Paquete Legal (.zip)";
            }
        }
    </script>
</body>
</html>
