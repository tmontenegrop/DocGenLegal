<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocGen Legal Pro | Validador</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-50 font-sans text-slate-900 pb-20">

    <nav class="bg-white border-b border-slate-200 py-4 px-8 mb-8 shadow-sm">
        <div class="max-w-6xl mx-auto flex items-center gap-2">
            <div class="bg-blue-600 p-2 rounded-lg"><i class="fas fa-gavel text-white"></i></div>
            <h1 class="text-xl font-bold text-slate-800">DocGen <span class="text-blue-600">Legal Pro</span></h1>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10">
            <div class="bg-white p-6 rounded-2xl shadow-md border border-slate-200">
                <label class="block text-sm font-bold text-slate-700 mb-4">1. Subir Base de Datos (Excel)</label>
                <input type="file" id="excelFile" accept=".xlsx, .xls" class="hidden" onchange="validarExcelInmediato()">
                <label for="excelFile" id="drop-excel" class="flex flex-col items-center justify-center w-full h-32 border-2 border-dashed border-slate-300 rounded-xl cursor-pointer hover:bg-blue-50 transition-all text-center p-4">
                    <i class="fas fa-file-excel text-2xl text-slate-400 mb-2"></i>
                    <span id="text-excel" class="text-sm text-slate-600 font-medium">Click para cargar Excel</span>
                </label>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-md border border-slate-200">
                <label class="block text-sm font-bold text-slate-700 mb-4">2. Plantilla Maestra (Word)</label>
                <input type="file" id="wordFile" accept=".docx" class="hidden" onchange="marcarCargado('wordFile', 'text-word')">
                <label for="wordFile" class="flex flex-col items-center justify-center w-full h-32 border-2 border-dashed border-slate-300 rounded-xl cursor-pointer hover:bg-blue-50 transition-all text-center p-4">
                    <i class="fas fa-file-word text-2xl text-slate-400 mb-2"></i>
                    <span id="text-word" class="text-sm text-slate-600 font-medium">Click para cargar Word</span>
                </label>
            </div>
        </div>

        <div id="section-previa" class="hidden animate-fade-in">
            <div class="bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden">
                <div class="p-6 bg-slate-800 text-white flex justify-between items-center">
                    <div>
                        <h3 class="font-bold">Revisión de Calidad de Datos</h3>
                        <p class="text-xs text-slate-400">Verifica los campos en rojo antes de continuar.</p>
                    </div>
                    <button onclick="generarZipFinal()" id="btnGenerar" class="bg-green-500 hover:bg-green-600 text-white px-8 py-3 rounded-xl font-bold transition-all flex items-center gap-2">
                        <i class="fas fa-file-archive" id="spinner"></i>
                        Generar Documentos
                    </button>
                </div>
                <div class="overflow-x-auto max-h-96">
                    <table class="w-full text-left text-sm border-collapse">
                        <thead id="tabla-head" class="bg-slate-100 sticky top-0 shadow-sm"></thead>
                        <tbody id="tabla-body"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

<script>
    // 1. UTILIDADES DE INTERFAZ
    function marcarCargado(id, textId) {
        const file = document.getElementById(id).files[0];
        if (file) {
            document.getElementById(textId).innerHTML = `<b class="text-green-600">✓ ${file.name}</b>`;
        }
    }

    // 2. LÓGICA DE DRAG & DROP
    ['excelFile', 'wordFile'].forEach(id => {
        const zoneId = id === 'excelFile' ? 'drop-excel' : null;
        const zone = zoneId ? document.getElementById(zoneId) : document.querySelector(`label[for="${id}"]`);

        if (!zone) return;

        ['dragover', 'dragleave', 'drop'].forEach(evt => {
            zone.addEventListener(evt, e => {
                e.preventDefault();
                e.stopPropagation();

                if (evt === 'dragover') zone.classList.add('bg-blue-100', 'border-blue-500');
                else zone.classList.remove('bg-blue-100', 'border-blue-500');

                if (evt === 'drop') {
                    const files = e.dataTransfer.files;
                    if (files.length > 0) {
                        document.getElementById(id).files = files;
                        // Disparar el evento manualmente según el tipo
                        if (id === 'excelFile') validarExcelInmediato();
                        else marcarCargado('wordFile', 'text-word');
                    }
                }
            });
        });
    });

    // 3. VALIDACIÓN EN TIEMPO REAL
    async function validarExcelInmediato() {
        const file = document.getElementById('excelFile').files[0];
        if (!file) return;

        const textLabel = document.getElementById('text-excel');
        textLabel.innerHTML = `<i class="fas fa-spinner fa-spin mr-2"></i> Analizando ${file.name}...`;

        const formData = new FormData();
        formData.append("excel_file", file);

        try {
            const res = await fetch("/validar-excel/", { method: "POST", body: formData });
            const data = await res.json();

            // Renderizar Cabecera
            const head = document.getElementById('tabla-head');
            head.innerHTML = `<tr><th class="p-4 border-b">Fila</th>${data.columnas.map(c => `<th class="p-4 border-b">${c}</th>`).join('')}</tr>`;

            // Renderizar Cuerpo con Alertas
            const body = document.getElementById('tabla-body');
            body.innerHTML = data.filas.map(fila => `
                <tr class="border-b hover:bg-slate-50">
                    <td class="p-4 font-bold text-slate-400">${fila.id}</td>
                    ${data.columnas.map(col => {
                        const msgError = fila.alertas[col];
                        return `<td class="p-4 ${msgError ? 'bg-red-50 text-red-600 font-bold' : ''}" title="${msgError || ''}">
                            ${fila.datos[col]} ${msgError ? '⚠️' : ''}
                        </td>`;
                    }).join('')}
                </tr>
            `).join('');

            document.getElementById('section-previa').classList.remove('hidden');
            textLabel.innerHTML = `<b class="text-green-600">✓ ${file.name}</b>`;
            window.scrollTo({ top: document.getElementById('section-previa').offsetTop, behavior: 'smooth' });

        } catch (error) {
            alert("Error al conectar con el servidor de validación.");
            textLabel.innerText = "Error al cargar. Reintenta.";
        }
    }

    // 4. GENERACIÓN FINAL DEL ZIP
    async function generarZipFinal() {
        const excel = document.getElementById('excelFile').files[0];
        const word = document.getElementById('wordFile').files[0];
        const btn = document.getElementById('btnGenerar');
        const spinner = document.getElementById('spinner');

        if (!excel || !word) return alert("Sube ambos archivos (Excel y Word) para generar.");

        btn.disabled = true;
        spinner.className = "fas fa-sync fa-spin";
        const originalText = btn.innerHTML;
        btn.innerHTML = `<i class="fas fa-sync fa-spin"></i> Generando ZIP...`;

        const formData = new FormData();
        formData.append("excel_file", excel);
        formData.append("template_file", word);

        try {
            const res = await fetch("/generar-zip/", { method: "POST", body: formData });

            if (res.ok) {
                const blob = await res.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = "Contratos_Legales.zip";
                document.body.appendChild(a);
                a.click();
                a.remove();
                alert("¡Documentos generados con éxito!");
            } else {
                alert("Error en el servidor al generar los documentos.");
            }
        } catch (e) {
            alert("Error de conexión al intentar generar el archivo.");
        } finally {
            btn.disabled = false;
            btn.innerHTML = originalText;
            spinner.className = "fas fa-file-archive";
        }
    }
</script>
</body>
</html>
